# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &c해당 작업에 대한 권한이 없습니다."

reload: "%prefix% &a플러그인이 다시 로드되었습니다."

