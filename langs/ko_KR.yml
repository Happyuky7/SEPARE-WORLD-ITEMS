  force-backup:
    start: "%prefix% &a백업을 시작합니다..."
    end: "%prefix% &a백업이 완료되었습니다."
    completed:
      - ""
      - "%prefix% &a백업이 완료되었습니다."
      - "&a백업이 &f%backup_path%에 저장되었습니다"
