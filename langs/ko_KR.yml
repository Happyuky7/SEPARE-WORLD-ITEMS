    error:
      - ""
      - "%prefix% &c백업 중에 오류가 발생했습니다."
      - "&c자세한 정보는 콘솔을 확인해주세요."
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aEssentialsX 투명화가 다시 활성화되었습니다&a."
    vanish-deactivated: "%prefix% &cEssentialsX 투명화가 비활성화되었습니다&c."

commands:
