    pending-invalid: "%prefix% &c대기 중인 작업이 올바르지 않습니다."
  cancel:
    success: "%prefix% &a대기 중인 확인을 취소했습니다."
  critical:
    header: "%prefix% &c이 명령어는 중요한 명령어입니다."
    confirm-within: "%prefix% &e%seconds%초 안에 다음을 입력해 확인하세요: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &e마이그레이션: &f%from% -> %to% &7(overwrite=%overwrite%)"