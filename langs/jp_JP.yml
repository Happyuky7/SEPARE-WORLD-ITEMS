# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &cその操作を行う権限がありません。"

reload: "%prefix% &aプラグインが再読み込みされました。"

backups:
  force-backup:
    start: "%prefix% &aバックアップを開始しています..."
    end: "%prefix% &aバックアップが完了しました。"
    completed:
      - ""
      - "%prefix% &aバックアップが完了しました。"
      - "&aバックアップが &f%backup_path% &aに保存されました"
      - ""
    error:
      - ""
      - "%prefix% &cバックアップ中にエラーが発生しました。"
      - "&c詳細についてはコンソールを確認してください。"
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aEssentialsXの透明化が再有効化されました&a。"
    vanish-deactivated: "%prefix% &cEssentialsXの透明化が無効化されました&c。"

commands:
  confirm:
    usage: "%prefix% &c使い方: /separeworlditems confirm <code>"
    no-pending: "%prefix% &c保留中の操作がないか、コードが期限切れ/無効です。"
    pending-invalid: "%prefix% &c保留中の操作が無効です。"
  cancel:
    success: "%prefix% &a保留中の確認をキャンセルしました。"
  critical:
    header: "%prefix% &cこれは重要なコマンドです。"
    confirm-within: "%prefix% &e%seconds%秒以内に次を実行して確認してください: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &e移行: &f%from% -> %to% &7(overwrite=%overwrite%)"