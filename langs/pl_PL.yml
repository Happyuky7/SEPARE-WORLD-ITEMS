# Lang ID | NOTE: Do not change this value.
lang-id: pl_PL # Example: en_US, pt_BR, es_ES, jp_JP, etc.
# Lang Version | NOTE: Do not change this value.
lang-version: 2.0.0 # Internal check update this file.

# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &cNie masz uprawnień do wykonania tej akcji."

reload: "%prefix% &aWtyczka została przeładowana."

backups:
  force-backup:
    start: "%prefix% &aRozpoczynanie kopii zapasowej..."
    end: "%prefix% &aKopia zapasowa zakończona."
    completed:
      - ""
      - "%prefix% &aKopia zapasowa zakończona."
      - "&aKopia zapasowa zapisana w &f%backup_path%"
      - ""
    error:
      - ""
      - "%prefix% &cWystąpił błąd podczas tworzenia kopii zapasowej."
      - "&cSprawdź konsolę, aby uzyskać więcej informacji."
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aTwoja niewidzialność EssentialsX została reaktywowana&a."
    vanish-deactivated: "%prefix% &cTwoja niewidzialność EssentialsX została dezaktywowana&c."

commands:
  confirm:
    usage: "%prefix% &cUżycie: /separeworlditems confirm <code>"
    no-pending: "%prefix% &cBrak oczekującej akcji lub kod wygasł/jest nieprawidłowy."
    pending-invalid: "%prefix% &cOczekująca akcja jest nieprawidłowa."
  cancel:
    success: "%prefix% &aAnulowano oczekujące potwierdzenie."
  critical:
    header: "%prefix% &cTo jest krytyczna komenda."
    confirm-within: "%prefix% &ePotwierdź w ciągu %seconds%s używając: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &eMigracja: &f%from% -> %to% &7(overwrite=%overwrite%)"