# Lang ID | NOTE: Do not change this value.
lang-id: pt_BR # Example: en_US, pt_BR, es_ES, jp_JP, etc.
# Lang Version | NOTE: Do not change this value.
lang-version: 2.0.0 # Internal check update this file.

# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &cVocê não tem permissão para fazer isso."

reload: "%prefix% &aPlugin recarregado."

backups:
  force-backup:
    start: "%prefix% &aIniciando backup..."
    end: "%prefix% &aBackup concluído."
    completed:
      - ""
      - "%prefix% &aBackup concluído."
      - "&aBackup salvo em &f%backup_path%"
      - ""
    error:
      - ""
      - "%prefix% &cOcorreu um erro durante o backup."
      - "&cPor favor, verifique o console para mais informações."
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aSeu vanish do EssentialsX foi reativado&a."
    vanish-deactivated: "%prefix% &cSeu vanish do EssentialsX foi desativado&c."

commands:
  confirm:
    usage: "%prefix% &cUso: /separeworlditems confirm <code>"
    no-pending: "%prefix% &cNenhuma ação pendente encontrada ou código expirado/inválido."
    pending-invalid: "%prefix% &cA ação pendente é inválida."
  cancel:
    success: "%prefix% &aConfirmação pendente cancelada."
  critical:
    header: "%prefix% &cEste é um comando crítico."
    confirm-within: "%prefix% &eConfirme em até %seconds%s usando: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &eMigração: &f%from% -> %to% &7(overwrite=%overwrite%)"