# SepareWorldItems
# Lang Translation: Traditional Chinese
# Original Author: https://github.com/Happyuky7/
# Contributors:
# - https://github.com/Happyuky7/
# Lasted Update Version (Plugin): 2.0.0

# Lang ID | NOTE: Do not change this value.
lang-id: zh_TW # Example: en_US, pt_BR, es_ES, jp_JP, etc.
# Lang Version | NOTE: Do not change this value.
lang-version: 2.0.0 # Internal check update this file.

# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &c你沒有權限執行此操作。"

reload: "%prefix% &a外掛已重新載入。"

backups:
  force-backup:
    start: "%prefix% &a開始備份..."
    end: "%prefix% &a備份已完成。"
    completed:
      - ""
      - "%prefix% &a備份已完成。"
      - "&a備份保存在 &f%backup_path%"
      - ""
    error:
      - ""
      - "%prefix% &c備份時發生錯誤。"
      - "&c請檢查控制臺以獲取更多資訊。"
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &a你的 EssentialsX 隱身已重新啟用&a。"
    vanish-deactivated: "%prefix% &c你的 EssentialsX 隱身已停用&c。"

commands:
  confirm:
    usage: "%prefix% &c用法: /separeworlditems confirm <code>"
    no-pending: "%prefix% &c沒有待確認的操作，或驗證碼已過期/無效。"
    pending-invalid: "%prefix% &c待確認的操作無效。"
  cancel:
    success: "%prefix% &a已取消待確認操作。"
  critical:
    header: "%prefix% &c這是一個關鍵指令。"
    confirm-within: "%prefix% &e請在 %seconds% 秒內輸入: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &e遷移: &f%from% -> %to% &7(overwrite=%overwrite%)"