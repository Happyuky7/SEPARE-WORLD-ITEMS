# Lang ID | NOTE: Do not change this value.
lang-id: ar_SA # Example: en_US, pt_BR, es_ES, jp_JP, etc.
# Lang Version | NOTE: Do not change this value.
lang-version: 2.0.0 # Internal check update this file.

# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &cليس لديك إذن للقيام بذلك."

reload: "%prefix% &aتم إعادة تحميل الإضافة."

backups:
  force-backup:
    start: "%prefix% &aبدء النسخ الاحتياطي..."
    end: "%prefix% &aاكتمل النسخ الاحتياطي."
    completed:
      - ""
      - "%prefix% &aاكتمل النسخ الاحتياطي."
      - "&aتم حفظ النسخة الاحتياطية في &f%backup_path%"
      - ""
    error:
      - ""
      - "%prefix% &cحدث خطأ أثناء النسخ الاحتياطي."
      - "&cيرجى مراجعة وحدة التحكم للحصول على مزيد من المعلومات."
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aتم إعادة تفعيل الاختفاء EssentialsX الخاص بك&a."
    vanish-deactivated: "%prefix% &cتم إلغاء تفعيل الاختفاء EssentialsX الخاص بك&c."

commands:
  confirm:
    usage: "%prefix% &cالاستخدام: /separeworlditems confirm <code>"
    no-pending: "%prefix% &cلا توجد عملية معلّقة أو أن الرمز منتهي/غير صالح."
    pending-invalid: "%prefix% &cالعملية المعلّقة غير صالحة."
  cancel:
    success: "%prefix% &aتم إلغاء التأكيد المعلّق."
  critical:
    header: "%prefix% &cهذا أمر حساس."
    confirm-within: "%prefix% &eقم بالتأكيد خلال %seconds% ثانية باستخدام: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &eالترحيل: &f%from% -> %to% &7(overwrite=%overwrite%)"