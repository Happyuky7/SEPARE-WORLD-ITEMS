# Lang ID | NOTE: Do not change this value.
lang-id: de_DE # Example: en_US, pt_BR, es_ES, jp_JP, etc.
# Lang Version | NOTE: Do not change this value.
lang-version: 2.0.0 # Internal check update this file.

# Basic
prefix: "&8[&aSepareWorldItems&8] &r" # Variable: %prefix%
no-permission: "%prefix% &cDu hast keine Berechtigung dafür."

reload: "%prefix% &aPlugin wurde neu geladen."

backups:
  force-backup:
    start: "%prefix% &aSicherung wird gestartet..."
    end: "%prefix% &aSicherung abgeschlossen."
    completed:
      - ""
      - "%prefix% &aSicherung abgeschlossen."
      - "&aSicherung gespeichert in &f%backup_path%"
      - ""
    error:
      - ""
      - "%prefix% &cEin Fehler ist beim Erstellen der Sicherung aufgetreten."
      - "&cBitte überprüfe die Konsole für weitere Informationen."
      - ""

integration:
  essentialsx:
    vanish-reactivated: "%prefix% &aDeine EssentialsX Unsichtbarkeit wurde reaktiviert&a."
    vanish-deactivated: "%prefix% &cDeine EssentialsX Unsichtbarkeit wurde deaktiviert&c."

commands:
  confirm:
    usage: "%prefix% &cVerwendung: /separeworlditems confirm <code>"
    no-pending: "%prefix% &cKeine ausstehende Aktion gefunden oder Code abgelaufen/ungültig."
    pending-invalid: "%prefix% &cAusstehende Aktion ist ungültig."
  cancel:
    success: "%prefix% &aAusstehende Bestätigung abgebrochen."
  critical:
    header: "%prefix% &cDies ist ein kritischer Befehl."
    confirm-within: "%prefix% &eBestätige innerhalb von %seconds%s mit: &f/separeworlditems confirm %code%"
    migration-summary: "%prefix% &eMigration: &f%from% -> %to% &7(overwrite=%overwrite%)"