
# SeparateWorldItems Configuration File

# NO Change this value.
config-version: 2.0.0

# Settings for the plugin.
settings:

  # Debug mode.
  # This is designed more for developers.
  # Default: false
  debug: false

  langs:

    # Auto download the language file from the GitHub repository. (Recommended enabled)
    # Default: true
    autoDownload: true

    # NOTE: 'langs' is a file that allows you to translate the plugin
    #       to any language that is not in the list of available languages yet.
    lang: "en_US" # Language file. (Default: en_US) | Change REQUIRED restart.

  # Auto configure worlds.
  # Should we add missing worlds to the config?
  # REQUIRED: options.default-group.group to be enabled.
  # Default: false
  auto-configure-worlds: false

  backups:
    # Enable backups.
    # Default: true
    enabled: true

    # Backup interval (default in days).
    # Default: 1
    interval: 1

    # Interval type:
    # Case sensitive.
    # Recommended: d (days), If you have many players for greater security 
    #              You could use hours but it is recommended only every 6 or 12 hours as a minimum.
    #
    # Default: DAYS
    # TYPES:
    # - SECONDS = s
    # - MINUTES = m
    # - HOURS = h
    # - DAYS = d
    interval-type: d

    # Maximum number of backups to keep.
    # Default: 25
    # NOTE: After all 25 are completed, the last of these will be removed so that a new one can be added.
    max-backups: 25

    # Remote snapshot (for MYSQL/MARIADB/MONGODB/REDIS).
    # When enabled, the plugin will export a local YAML snapshot into the backup zip.
    # NOTE: This can be heavy on large servers.
    remote-snapshot:
      enabled: false

  # Change logs (inventory + all saved player data).
  # For DB backends (SQL/Mongo/Redis) the plugin can record a snapshot on every save.
  # Default retention is guaranteed to be at least 30 days.
  # NOTE: This can grow fast on large servers.
  change-logs:
    # Enable change logs for DB backends.
    # Default: true
    enabled: true

    # Keep logs for at least this many days.
    # Default: 30 (1 month)
    # NOTE: The plugin will enforce a minimum of 30 days.
    retention-days: 30

    # Store the full YAML payload for each snapshot.
    # If false, logs may be empty (reserved for future hashing).
    # Default: true
    include-payload: true

    # If true, the log payload captures the player's current full state (inventory + everything supported)
    # even if you disabled some save toggles under settings.options.saves.*
    # Default: true
    capture-all-data: true

    # YAML/file-based logs (optional).
    # Recommended only for small servers (example: <= 50 players) due to disk usage.
    yaml:
      enabled: false
      recommended-max-players: 50

    # SQLite confirmation.
    # SQLite logs can grow the local .sqlite file quickly.
    # To enable change-logs on SQLITE you must explicitly confirm.
    sqlite:
      confirmed: false

  # Options for the plugin.
  options:

    # Default group.
    # This group is used when the world is not in the list of worlds.
    # ----------------------------------------
    # NOTE: In case you delete the default group in the “groups” list change the group below.
    #       Example: group: otherworldgroup
    # NOTE 2: You can also change the default group if you want to use a group other than “default”.
    # ----------------------------------------
    # Default: enabled and group: default
    default-group:
      enabled: true
      group: default

    # Save options.
    # This option is used to save the player's status when they leave the world
    # ----------------------------------------
    # NOTE: If you disable this option, the player will lose their status when they leave the world.
    # WARNING: If you change any of this when you have time with player inventories make a backup
    #          of your server in case any errors occur.
    # ----------------------------------------
    saves:
      gamemode: true
      # Flying (Include AllowFlight)
      flying: true
      fly-speed: true
      exp: true
      enderchest: true
      inventory: true
      potion-effects: true
      food-level: true
      off-hand: true
      health: true

    # Optional per-group overrides for what is saved.
    # If a key exists here, it overrides the global saves.* for that group.
    # Example:
    # saves-per-group:
    #   default:
    #     inventory: true
    #   otherworldgroup:
    #     inventory: false
    saves-per-group: {}


  health-options:
    # TYPES:
    # - BUKKIT
    # - CUSTOM (BYPASS) | (Use it if the plugin you're using isn't supported here, if you want support added, contact us via Discord and create a ticket.)
    # - AURA_SKILLS (Requires AuraSkills (AureliumSkills) plugin and integration enabled)
    type: BUKKIT

# Integrations:
integrations:
  placeholderapi:
    # Enable PlaceholderAPI support.
    # Default: true
    # Required: PlaceholderAPI plugin.
    enabled: true
  auraskills:
    # Enable AuraSkills (AureliumSkills) support.
    # Default: false
    # Required: AuraSkills (AureliumSkills) plugin.
    # NOTE: BETA!
    enabled: false
  worldguard:
    # Enable WorldGuard support.
    # Default: false
    # Required: WorldGuard plugin.
    enabled: false
  essentials:
    # Enable Essentials support.
    # Default: false
    # Required: Essentials plugin.
    enabled: false


# Storage backend
# Default: YAML (same behavior as before)
# TYPES: YAML, SQLITE, MYSQL, MARIADB, MONGODB, REDIS
#
# WARNING (IMPORTANT): MYSQL/MARIADB/MONGODB/REDIS are still BETA.
# They may contain bugs and could corrupt player data.
# Make backups before using them.
# If you use WorldGuard regions, the risk is higher than world-only switching.
storage:
  type: YAML
  # (LEGACY) If true and type != YAML, imports existing YAML files into the selected backend on startup.
  # NOTE: This does NOT delete the YAML files.
  # NOTE 2: This is basically the same as enabling migration with "from: YAML".
  migrate-from-yaml: false

  # Any -> Any migration (runs on startup).
  # Example: migrate from REDIS to MYSQL
  # storage:
  #   type: MYSQL
  #   migration:
  #     enabled: true
  #     from: REDIS
  #     overwrite: false
  migration:
    enabled: false
    from: YAML
    # If false, only writes records that do not exist in target.
    overwrite: false

  sqlite:
    # File name inside the plugin folder.
    file: "separeworlditems.sqlite"

  sql:
    # For MYSQL/MARIADB
    # You can configure EITHER a full JDBC URL OR a host/port/database.
    #
    # Option 1) Full JDBC URL (advanced)
    # Example: jdbc:mysql://localhost:3306/separeworlditems?useSSL=false
    jdbc-url: ""

    # Option 2) Host + Port + Database (easy)
    # If jdbc-url is empty and host+database are set, the plugin will build the JDBC URL automatically.
    host: ""
    port: 3306
    database: "separeworlditems"

    # Optional JDBC parameters appended to the URL (no need to include '?')
    # Example: "useSSL=false&autoReconnect=true"
    parameters: ""
    username: ""
    password: ""
    pool:
      maxPoolSize: 10

  mongodb:
    uri: "mongodb://localhost:27017"
    database: "separeworlditems"
    collection: "player_data"
    # Optional collection for change logs
    logs-collection: "change_logs"

  redis:
    uri: "redis://localhost:6379"
    key-prefix: "swi"
  

# Groups:
# Recommended: default, no remove or change.
# You can add more groups.
groups:
  - default
  - otherworldgroup

# Worlds:
# In the worlds section you can set the group for each world.
# Worlds is case sensitive.
# Format --> world: group
worlds:
  world: default
  world_nether: otherworldgroup
  world_the_end: default


# WorldGuard Regions: (BETA!)
# 
# WARNING: This section is only available if the WorldGuard integration is enabled.
# WARNING 2: NEW IMPLEMENTATION, THIS IS NO FULLY TESTED.
# WARNING 3: MAKE A BACKUP OF YOUR SERVER IN CASE ANY ERRORS OCCUR
worldguard-regions:
  # In the worldguard-regions section you can set the group for each WorldGuard region.
  #
  # NOTE: This is only available if the WorldGuard integration is enabled.
  # NOTE 2: Regions is case sensitive.
  # NOTE 3: If a player is in multiple regions, the region with the highest priority will be used.
  # NOTE 4: If a player is not in any region, the world group will be used.
  # NOTE 5: If a region is not in the list, the world group will
  #

  # Groups for regions.
  groups:
  - defaultregiongroup
  - otherregiongroup

  # Regions and their groups.
  # Supported formats:
  # 1) Global (legacy): affects all worlds
  #    regions:
  #      spawn: defaultregiongroup
  # 2) Per-world (recommended):
  #    regions:
  #      world:
  #        spawn: defaultregiongroup
  #      world_nether:
  #        spawn: otherregiongroup
  # Regions is case sensitive.
  regions:
    spawn: defaultregiongroup
    pvp: otherregiongroup


# EssentialsX (BETA!)
essentialsx:
  vanish-bypass: true # Allow players in vanish to bypass the plugin restrictions.


auraskills:
  save-mana: true # Save Mana to change world
  # Others Skills and in comming soon update.
  # save-skillnamehere: boolean


# Metrics:
# Should we enable metrics?
# Default: true
# NOTE: This no implemented in this version. It will be available in future versions.
metrics:
  enabled: true



